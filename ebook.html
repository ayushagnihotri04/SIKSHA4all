<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - E-Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #360033, #0b8793); }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; color: #2c3e50; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #27ae60; }
        .btn-back { background: #e74c3c; }
        .btn:hover { opacity: 0.8; }
        footer { margin-top: 20px; font-size: 12px; color: #555; }
        .ebook-list { margin-top: 20px; text-align: left; }
        .ebook-item { display: flex; justify-content: space-between; align-items: center; background: #f5f5f5; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .ebook-item a { text-decoration: none; color: #007bff; }
        .ebook-item button { background: red; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .nav-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
        }
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .back-button:hover {
            text-decoration: underline;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="back-button" onclick="goBack()">← Back</button>
    </div>
    <div class="container">
        <h2>Welcome to Educator’s Dashboard</h2>
        <h3>E-Books</h3>
        <input type="text" id="bookName" placeholder="Enter Book Name">
        <input type="text" id="bookLink" placeholder="Enter Book Link">
        <button class="btn btn-add" onclick="addEbook()">Add E-Book</button>
        <div class="ebook-list" id="ebookList"></div>
        <footer>©शिक्षा④All 2025. All Rights Reserved.</footer>
    </div>
    
    <script>
        let ebooks = JSON.parse(localStorage.getItem('ebooks')) || [];

        function addEbook() {
            let bookName = document.getElementById('bookName').value.trim();
            let bookLink = document.getElementById('bookLink').value.trim();
            if (bookName === "" || bookLink === "") {
                alert("Please fill in both fields.");
                return;
            }
            ebooks.push({ name: bookName, link: bookLink });
            localStorage.setItem('ebooks', JSON.stringify(ebooks));
            document.getElementById('bookName').value = "";
            document.getElementById('bookLink').value = "";
            showEbookList();
        }

        function showEbookList() {
            const listContainer = document.getElementById('ebookList');
            listContainer.innerHTML = "";
            if (ebooks.length === 0) {
                listContainer.innerHTML = "<p>No e-books available.</p>";
            } else {
                ebooks.forEach((book, index) => {
                    listContainer.innerHTML += `
                        <div class="ebook-item">
                            <span>${book.name}</span>
                            <div>
                                <a href="${book.link}" target="_blank">View</a>
                                <button onclick="deleteEbook(${index})">Delete</button>
                            </div>
                        </div>`;
                });
            }
        }

        function deleteEbook(index) {
            if (confirm("Are you sure you want to delete this e-book?")) {
                ebooks.splice(index, 1);
                localStorage.setItem('ebooks', JSON.stringify(ebooks));
                showEbookList();
            }
        }

        showEbookList();
        function goBack() { 
            window.location.href = "teachers.html"; 
        }
    </script>
</body>
</html>
