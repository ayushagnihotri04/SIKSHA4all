<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Marks Portal</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        input, select {
            background: white;
            color: black;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        .marks-list {
            margin-top: 20px;
            text-align: left;
        }
        .nav-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
        }
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .back-button:hover {
            text-decoration: underline;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        footer { 
            margin-top: 20px; font-size: 12px; color: #ffe5e5; 
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="back-button" onclick="goBack()">← Back</button>
    </div>
    <div class="container">
        <h2>Assignment Marks Portal</h2>
        <input type="text" id="studentName" placeholder="Enter Student Name">
        <input type="number" id="marks" placeholder="Enter Marks">
        <button onclick="addMarks()">Upload Marks</button>
        <div class="marks-list" id="marksList"></div>
        <footer>©शिक्षा④All 2025. All Rights Reserved.</footer>
    </div>

    <script>
        function addMarks() {
            const name = document.getElementById("studentName").value;
            const marks = document.getElementById("marks").value;
            if (name === "" || marks === "") {
                alert("Please enter both name and marks!");
                return;
            }
            
            const marksList = document.getElementById("marksList");
            const entry = document.createElement("p");
            entry.innerHTML = `<strong>${name}:</strong> ${marks} Marks`;
            marksList.appendChild(entry);
            
            document.getElementById("studentName").value = "";
            document.getElementById("marks").value = "";
        }
        function goBack() {
            window.location.href = 'teachers.html';
        }
    </script>
</body>
</html>
