<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classes - Educator Hub</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        select {
            background: white;
            color: black;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        .nav-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
        }
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .back-button:hover {
            text-decoration: underline;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        footer { 
            margin-top: 20px; font-size: 12px; color: #d2c6c6; 
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="back-button" onclick="goBack()">← Back</button>
    </div>
    <div class="container">
        <h2>Select Your Class</h2>
        <select id="category" onchange="updateOptions()">
            <option value="">-- Select Category --</option>
            <option value="school">School</option>
            <option value="college">College</option>
        </select>
        <div id="dynamic-fields"></div>
        <footer>©शिक्षा④All 2025. All Rights Reserved.</footer>
    </div>

    <script>
        const teachers = ["Mr. Sharma", "Ms. Gupta", "Dr. Verma", "Prof. Singh", "Mrs. Kapoor"];

        function updateOptions() {
            const category = document.getElementById("category").value;
            const container = document.getElementById("dynamic-fields");
            container.innerHTML = "";
            
            if (category === "school") {
                container.innerHTML = `
                    <select id="class" onchange="updateSubjects()">
                        <option value="">-- Select Class --</option>
                        <option value="10">10th</option>
                        <option value="11">11th</option>
                        <option value="12">12th</option>
                    </select>
                    <div id="stream-container"></div>
                    <div id="subject-container"></div>
                `;
            } else if (category === "college") {
                container.innerHTML = `
                    <select id="course" onchange="updateSubjects()">
                        <option value="">-- Select Course --</option>
                        <option value="btech">B.Tech</option>
                        <option value="bca">BCA</option>
                        <option value="bba">BBA</option>
                    </select>
                    <div id="subject-container"></div>
                `;
            }
        }

        function updateSubjects() {
            const category = document.getElementById("category").value;
            let subjectsHTML = "";
            let streamHTML = "";
            const subjectContainer = document.getElementById("subject-container");
            const streamContainer = document.getElementById("stream-container");
            
            if (category === "school") {
                const selectedClass = document.getElementById("class").value;
                if (selectedClass === "11" || selectedClass === "12") {
                    streamHTML = `
                        <select id="stream" onchange="updateSubjects()">
                            <option value="">-- Select Stream --</option>
                            <option value="science">Science</option>
                            <option value="commerce">Commerce</option>
                            <option value="arts">Arts</option>
                        </select>
                    `;
                }
                
                if (selectedClass === "10") {
                    subjectsHTML = getSubjectsDropdown(["Math", "Science", "English", "Social Studies"]);
                } else {
                    const stream = document.getElementById("stream")?.value;
                    if (stream === "science") {
                        subjectsHTML = getSubjectsDropdown(["Physics", "Chemistry", "Math", "Biology"]);
                    } else if (stream === "commerce") {
                        subjectsHTML = getSubjectsDropdown(["Accountancy", "Business Studies", "Economics"]);
                    } else if (stream === "arts") {
                        subjectsHTML = getSubjectsDropdown(["History", "Political Science", "Psychology"]);
                    }
                }
            }
            
            if (category === "college") {
                const selectedCourse = document.getElementById("course").value;
                if (selectedCourse === "btech") {
                    subjectsHTML = getSubjectsDropdown(["Data Structures", "Operating Systems", "DBMS", "AI"]);
                } else if (selectedCourse === "bca") {
                    subjectsHTML = getSubjectsDropdown(["Programming", "Web Development", "Networking"]);
                } else if (selectedCourse === "bba") {
                    subjectsHTML = getSubjectsDropdown(["Marketing", "Finance", "Human Resources"]);
                }
            }

            streamContainer.innerHTML = streamHTML;
            subjectContainer.innerHTML = subjectsHTML;
        }

        function getSubjectsDropdown(subjects) {
            return `
                <select id="subject">
                    <option value="">-- Select Subject --</option>
                    ${subjects.map(sub => `<option value="${sub}">${sub}</option>`).join("")}
                </select>
                <button onclick="proceedToMyClasses()">Proceed</button>
            `;
        }

        function proceedToMyClasses() {
            const subject = document.getElementById("subject")?.value;
            if (!subject) {
                alert("Please select all required options!");
                return;
            }
            
            const randomTeacher = teachers[Math.floor(Math.random() * teachers.length)];
            alert(`Lecture assigned to: ${randomTeacher} for subject ${subject}`);
        }

        function goBack() {
            window.location.href = 'teachers.html';
        }
    </script>
</body>
</html>
