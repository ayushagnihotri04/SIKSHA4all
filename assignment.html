<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Create Assignment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(#ad5389, #3c1053);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
        }
        h2 {
            color: #1e3a46;
            margin-bottom: 10px;
        }
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .save-btn {
            background: #ffb300;
            color: white;
        }
        .save-btn:hover {
            background: #ff9800;
        }
        .back-btn {
            background: #ccc;
            margin-top: 10px;
        }
        .back-btn:hover {
            background: #b3b3b3;
        }
        .assignments {
            margin-top: 20px;
            width: 400px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }
        .assignment-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: darkred;
        }
        
        .nav-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
        }
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .back-button:hover {
            text-decoration: underline;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        footer { 
            margin-top: 20px; font-size: 12px; color: #555; 
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="back-button" onclick="goBack()">← Back</button>
    </div>
    <div class="container">
        <h2>Welcome to Teacher Portal</h2>
        <h3>Create Assignment</h3>
        <form id="assignmentForm">
            <div class="form-group">
                <label for="title">Assignment Title</label>
                <input type="text" id="title" placeholder="Enter Assignment Title" required>
            </div>
            <div class="form-group">
                <label for="details">Assignment Details</label>
                <textarea id="details" rows="4" placeholder="Enter Assignment Details" required></textarea>
            </div>
            <button type="submit" class="save-btn">Save Assignment</button>
            <footer>©शिक्षा④All 2025. All Rights Reserved.</footer>
        </form>
    </div>

    <div class="assignments">
        <h3>Saved Assignments</h3>
        <div id="assignmentList"></div>
    </div>

    <script>
        document.getElementById("assignmentForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const title = document.getElementById("title").value.trim();
            const details = document.getElementById("details").value.trim();
            
            if (title === "" || details === "") {
                alert("Please fill in all fields");
                return;
            }
            saveAssignment(title, details);
            document.getElementById("assignmentForm").reset();
        });

        function saveAssignment(title, details) {
            const assignmentList = document.getElementById("assignmentList");
            const div = document.createElement("div");
            div.classList.add("assignment-item");
            div.innerHTML = `<span><b>${title}</b>: ${details}</span> <button class="delete-btn" onclick="deleteAssignment(this)">Delete</button>`;
            assignmentList.appendChild(div);
        }

        function deleteAssignment(button) {
            button.parentElement.remove();
        }

        function goBack() {
            window.location.href = 'teachers.html';
        }
    </script>
</body>
</html>
