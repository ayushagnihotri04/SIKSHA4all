<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Profile | शिक्षा④All</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.5);
      max-width: 700px;
      width: 100%;
      position: relative;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 5px;
      font-size: 16px;
      background-color: rgba(255, 255, 255, 0.9);
      color: #000;
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      background: linear-gradient(to right, #00b09b, #96c93d);
      color: white;
      font-size: 18px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    /* Back button style */
    .back-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background-color: rgba(255, 255, 255, 0.25);
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
      font-size: 14px;
    }

    .back-btn:hover {
      background-color: rgba(255, 255, 255, 0.5);
      color: #1e3c72;
    }

  </style>
</head>
<body>

<div class="container">
  <button class="back-btn" onclick="goBack()">← Go Back</button>
  <h2>👤 Student Profile</h2>
  <form>

    <label>Student Name</label>
    <input type="text" placeholder="Enter full name">

    <label>Father's Name</label>
    <input type="text" placeholder="Enter father's name">

    <label>Mother's Name</label>
    <input type="text" placeholder="Enter mother's name">

    <label>Date of Birth</label>
    <input type="date">

    <label>Student Contact Number</label>
    <input type="tel" placeholder="Enter student mobile no.">

    <label>Parent Contact Number</label>
    <input type="tel" placeholder="Enter parent mobile no.">

    <label>Institution</label>
    <select id="institution" onchange="toggleInstitutionFields()">
      <option value="">-- Select Institution --</option>
      <option value="school">School</option>
      <option value="college">College</option>
    </select>

    <!-- School Fields -->
    <div id="schoolFields" class="hidden">
      <label>Class</label>
      <select id="schoolClass" onchange="toggleStream()">
        <option value="">-- Select Class --</option>
        <option value="10">10th</option>
        <option value="11">11th</option>
        <option value="12">12th</option>
      </select>

      <div id="streamFields" class="hidden">
        <label>Stream</label>
        <select>
          <option value="">-- Select Stream --</option>
          <option>Maths</option>
          <option>Biology</option>
          <option>Commerce</option>
          <option>Arts</option>
        </select>
      </div>
    </div>

    <!-- College Fields -->
    <div id="collegeFields" class="hidden">
      <label>Course</label>
      <select id="collegeCourse" onchange="toggleCollegeDetails()">
        <option value="">-- Select Course --</option>
        <option value="btech">B.Tech</option>
        <option value="bcom">B.Com</option>
        <option value="bsc">B.Sc</option>
        <option value="ba">BA</option>
        <option value="bba">BBA</option>
      </select>

      <div id="btechFields" class="hidden">
        <label>Branch</label>
        <select>
          <option>CSE</option>
          <option>CSE-Data Science</option>
          <option>CSE-AIR</option>
          <option>CSE-AIML</option>
        </select>
        <label>Semester</label>
        <select>
          <option>1st</option><option>2nd</option><option>3rd</option><option>4th</option>
          <option>5th</option><option>6th</option><option>7th</option><option>8th</option>
        </select>
      </div>
    </div>

    <button class="submit-btn" type="submit">Submit</button>
  </form>
</div>

<script>
  function toggleInstitutionFields() {
    const type = document.getElementById("institution").value;
    document.getElementById("schoolFields").classList.toggle("hidden", type !== "school");
    document.getElementById("collegeFields").classList.toggle("hidden", type !== "college");
    // Reset hidden areas
    document.getElementById("streamFields").classList.add("hidden");
    document.getElementById("btechFields").classList.add("hidden");
  }

  function toggleStream() {
    const cls = document.getElementById("schoolClass").value;
    document.getElementById("streamFields").classList.toggle("hidden", !(cls === "11" || cls === "12"));
  }

  function toggleCollegeDetails() {
    const course = document.getElementById("collegeCourse").value;
    document.getElementById("btechFields").classList.toggle("hidden", course !== "btech");
  }

  function goBack() {
    window.history.back(); // Go back to the previous page
  }
</script>

</body>
</html>
