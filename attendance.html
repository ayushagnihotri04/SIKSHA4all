      color: #4caf50;
    }
    .good {
      color: #ffeb3b;
    }
    .low {
      color: #f44336;
    }

    #attendanceModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      overflow-y: auto;
    }
    #attendanceModal > div {
      background: #fff;
      color: #000;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 8px;
      position: relative;
    }
    #attendanceModal button {
      cursor: pointer;
      padding: 5px 10px;
      border: none;
      background: #0072ff;
      color: #fff;
      border-radius: 5px;
      font-size: 14px;
      transition: background 0.3s ease;
    }
    #attendanceModal button:hover {
      background: #005bb5;
    }
    #backButton {
      margin-bottom: 10px;
    }
    #closeModal {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #f44336;
    }
    #closeModal:hover {
      background: #b71c1c;
    }
    label, select {
      font-size: 16px;
      margin-bottom: 10px;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #eee;
      color: #000;
    }
  </style>
</head>
<body>

  <h1>📊 My Attendance Dashboard</h1>
  <div id="subjectCards" class="dashboard">
    <div class="card" onclick="openAttendanceModal('Mathematics', 'Mr. Raj Gupta')">
      <h2>Mathematics</h2>
      <p>👨‍🏫 Teacher: Mr. Raj Gupta</p>
      <p>📈 Attendance: 92%</p>
      <div class="progress-bar">
        <div class="progress" style="width: 92%;"></div>
      </div>
      <div class="status excellent">✅ Excellent Attendance</div>
    </div>

    <div class="card" onclick="openAttendanceModal('Physics', 'Ms. Neha Mehta')">
      <h2>Physics</h2>
      <p>👨‍🏫 Teacher: Ms. Neha Mehta</p>
      <p>📈 Attendance: 78%</p>
      <div class="progress-bar">
        <div class="progress" style="width: 78%; background: orange;"></div>
      </div>
      <div class="status good">⚠️ Good Attendance</div>
    </div>

    <div class="card" onclick="openAttendanceModal('Chemistry', 'Dr. Ramesh Sharma')">
      <h2>Chemistry</h2>
      <p>👨‍🏫 Teacher: Dr. Ramesh Sharma</p>
      <p>📈 Attendance: 58%</p>
      <div class="progress-bar">
        <div class="progress" style="width: 58%; background: red;"></div>
      </div>
      <div class="status low">❌ Low Attendance</div>
    </div>
  </div>

  <div id="attendanceModal">
    <div>
      <button id="backButton">← Back</button>
      <button id="closeModal">X</button>
      <h2 id="modalSubjectName"></h2>
      <p id="modalTeacherName"></p>

      <label for="dateSelect">Select Date:</label>
      <select id="dateSelect"></select>

      <table>
        <thead>
          <tr><th>Date</th><th>Status</th><th>Remarks</th></tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const modal = document.getElementById('attendanceModal');
    const closeModalBtn = document.getElementById('closeModal');
    const backButton = document.getElementById('backButton');
    const modalSubjectName = document.getElementById('modalSubjectName');
    const modalTeacherName = document.getElementById('modalTeacherName');
    const attendanceTableBody = document.getElementById('attendanceTableBody');
    const dateSelect = document.getElementById('dateSelect');

    const attendanceData = {
      'Mathematics': [
        { date: '2025-05-01', status: 'Present', remarks: '' },
        { date: '2025-05-02', status: 'Absent', remarks: 'Sick' },
        { date: '2025-05-03', status: 'Present', remarks: '' },
      ],
      'Physics': [
        { date: '2025-05-01', status: 'Present', remarks: '' },
        { date: '2025-05-02', status: 'Present', remarks: '' },
      ],
      'Chemistry': [
        { date: '2025-05-01', status: 'Absent', remarks: 'Family Emergency' },
        { date: '2025-05-03', status: 'Present', remarks: '' },
      ],
    };

    function openAttendanceModal(subjectName, teacherName) {
      modalSubjectName.textContent = subjectName;
      modalTeacherName.textContent = 'Teacher: ' + teacherName;

      const records = attendanceData[subjectName] || [];
      const uniqueDates = [...new Set(records.map(r => r.date))].sort();

      dateSelect.innerHTML = '';
      uniqueDates.forEach(date => {
        const option = document.createElement('option');
        option.value = date;
        option.textContent = date;
        dateSelect.appendChild(option);
      });

      if (uniqueDates.length > 0) {
        dateSelect.value = uniqueDates[0];
        updateAttendanceTable(subjectName, uniqueDates[0]);
      } else {
        attendanceTableBody.innerHTML = '<tr><td colspan="3">No attendance records.</td></tr>';
      }

      modal.style.display = 'block';
    }

    function updateAttendanceTable(subjectName, selectedDate) {
      const records = attendanceData[subjectName] || [];
      const filteredRecords = records.filter(r => r.date === selectedDate);

      if (filteredRecords.length === 0) {
        attendanceTableBody.innerHTML = '<tr><td colspan="3">No records for this date.</td></tr>';
      } else {
        attendanceTableBody.innerHTML = '';
        filteredRecords.forEach(record => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${record.date}</td>
            <td>${record.status}</td>
            <td>${record.remarks || '-'}</td>
          `;
          attendanceTableBody.appendChild(tr);
        });
      }
    }

    dateSelect.addEventListener('change', () => {
      const subjectName = modalSubjectName.textContent;
      updateAttendanceTable(subjectName, dateSelect.value);
    });

    closeModalBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    backButton.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    window.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
</body>
</html>
