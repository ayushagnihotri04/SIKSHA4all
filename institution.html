<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Institution</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(#283c86, #45a247);
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 30px;
            background: rgba(30, 60, 114, 0.9);
            position: fixed;
            top: 0;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .logout-btn {
            background: #c0392b;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #e68900;
            transform: scale(1.05);
        }
        main {
            margin-top: 50px;
            justify-content: center;
            align-items: center;
        }
        h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }
        .institution-container {
            display: flex;
            gap: 20px;
        }
        .institution-btn {
            background: rgba(255, 152, 0, 0.9);
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            width: 150px;
            transition: all 0.3s;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
        }
        .institution-btn:hover {
            background: #e68900;
            transform: translateY(-3px);
        }
        .back-btn {
            margin-top: 20px;
            background: #f44336;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #d32f2f;
        }
        footer {
            margin-top: 30px;
            padding: 15px;
            background: rgba(30, 60, 114, 0.9);
            width: 100%;
            position: fixed;
            bottom: 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">शिक्षा④All</div>
        <!-- <button class="logout-btn" onclick="location.href='index.html'">Logout</button> -->
    </header>


    <!-- NAVBAR FLOATING MENU BUTTON -->
<div style="position: absolute; top: 20px; right: 20px; z-index: 1000;">
    <button onclick="toggleDropdown()" style="
      background: linear-gradient(to right, #f12711, #f5af19);
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 20px;
      color: white;
    ">
      ☰
    </button>
  
    <!-- Dropdown Menu -->
    <div id="dropdownMenu" style="
      display: none;
      margin-top: 10px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: absolute;
      right: 0;
      width: 180px;
    ">
      <a href="profile.html" style="display: block; padding: 10px; color: black; text-decoration: none;">Your Profile</a>
      <a href="attendance.html" style="display: block; padding: 10px; color: black; text-decoration: none;">Check Attendance</a>
      <a href="marks.html" style="display: block; padding: 10px; color: black; text-decoration: none;">Check Marks</a>
      <a href="index.html" style="display: block; padding: 10px; color: red; text-decoration: none;">Logout</a>
    </div>
  </div>
  
    <main>
        <h2>Select Your Institution</h2>
        <div class="institution-container">
            <button id="school-btn" class="institution-btn">School</button>
            <button id="college-btn" class="institution-btn">College</button>
        </div>
    </main>
    
    <script>
        document.getElementById("school-btn").addEventListener("click", function () {
            window.location.href = "class.html";  // Redirect to class.html for School
        });
        
        document.getElementById("college-btn").addEventListener("click", function () {
            window.location.href = "course.html"; // Redirect to course.html for College
        });
        
        function goBack() {
            window.history.back(); // Go back to the previous page
        }
        function toggleDropdown() {
            const menu = document.getElementById("dropdownMenu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }
    </script>
    
    <footer>
        &copy; 2025 शिक्षा④All. All Rights Reserved.
    </footer>
</body>
</html>
